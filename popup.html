<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
    <title>sd-swap</title>
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand__mark"><img src="icon.png" alt="" width="34" height="34" /></span>
        <div class="brand__text">
          <h1>Dreamina</h1>
          <p>Account switcher</p>
        </div>
      </div>
      <span class="count-pill"><b id="count">0</b> acc</span>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-panel="list" type="button">Tài khoản</button>
      <button class="tab" data-panel="manage" type="button">Quản lý</button>
    </nav>

    <section id="panel-list" class="panel is-active">
      <ul id="accountList" class="list"></ul>
    </section>

    <section id="panel-manage" class="panel">
      <label class="field-label" for="accounts">
        Danh sách <span>email|password mỗi dòng</span>
      </label>
      <textarea id="accounts" spellcheck="false" placeholder="email@example.com|matkhau"></textarea>
      <div class="toolbar">
        <button id="save" class="btn btn--primary">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none"><path d="M5 4h11l3 3v13H5z M9 4v5h6M8 14h8" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>
          Lưu
        </button>
        <button id="exportBtn" class="btn btn--ghost">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none"><path d="M12 4v10m0 0l-4-4m4 4l4-4M5 19h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export backup
        </button>
      </div>
    </section>

    <div id="status" class="toast" hidden></div>

    <script src="accounts.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
